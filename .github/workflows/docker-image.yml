name: Docker Image CI

on:
  push:
    branches:
        - "**"
    tags:
        - "v*.*.*"
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Get Branch Name
      id: branch-name
      uses: tj-actions/branch-names@v8
    - name: Determine Docker tag
      id: docker-tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # Extract tag name (e.g., v0.6.0 -> 0.6.0)
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "is_tag=true" >> $GITHUB_OUTPUT
        else
          # Use branch name, sanitize / to -
          BRANCH_NAME="${{ steps.branch-name.outputs.current_branch }}"
          SANITIZED_BRANCH=$(echo "${BRANCH_NAME}" | sed 's/\//-/g')
          echo "tag=${SANITIZED_BRANCH}" >> $GITHUB_OUTPUT
          echo "is_tag=false" >> $GITHUB_OUTPUT
        fi
    - name: Setup QEMU
      uses: docker/setup-qemu-action@v3
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Login to Docker HUB
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build the Docker image
      uses: docker/build-push-action@v6
      with:
        context: "{{defaultContext}}:docker"
        platforms: linux/amd64,linux/arm64
        file: ./Dockerfile
        push: true
        build-args: |
          BRANCH=${{ steps.docker-tag.outputs.tag }}
          COMMIT_SHA=${{ github.sha }}
          CACHEBUST=${{ github.sha }}
        tags: |
          hemna6969/haminfo:${{ steps.docker-tag.outputs.tag }}
          hemna6969/haminfo:latest
