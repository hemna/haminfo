services:
  haminfo_db:
    # TimescaleDB with PostGIS for time-series compression
    # See docs/superpowers/specs/2026-03-22-timescaledb-compression-design.md
    image: timescale/timescaledb-ha:pg15-latest
    restart: unless-stopped
    container_name: haminfo_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haminfo}
      POSTGRES_USER: ${POSTGRES_USER:-haminfo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /haminfo/db/data
    ports:
      - 5432:5432
    volumes:
        - ./data/db:/haminfo/db/data
        - ./data/backup:/haminfo/backup
    healthcheck:
        test: ["CMD-SHELL", "pg_isready"]
        interval: 10s
        timeout: 5s
        retries: 5
    labels:
        com.centurylinklabs.watchtower.enable: "false"

  db_upgrade:
    image: hemna6969/haminfo:latest
    depends_on:
        - "haminfo_db"
    volumes:
      - ./data/config:/config
    entrypoint: /app/db_upgrade.sh

  mqtt_ingest:
    image: hemna6969/haminfo:latest
    restart: on-failure
    depends_on:
        - "db_upgrade"
    volumes:
      - ./data/config:/config
    entrypoint: /app/run_mqtt.sh
    labels:
      deunhealth.restart.on.unhealthy: "true"
    healthcheck:
        test: ["CMD", "uv", "run", "haminfo", "mqtt-healthcheck"]
        interval: 5m
        timeout: 15s

  # Free-threaded Python 3.13t version for better multi-threaded performance
  # Use this instead of mqtt_ingest for experimental no-GIL support
  # Build with: docker build -f Dockerfile-freethreaded -t hemna6969/haminfo:freethreaded .
  mqtt_ingest_freethreaded:
    image: hemna6969/haminfo:freethreaded
    restart: on-failure
    depends_on:
        - "db_upgrade"
    volumes:
      - ./data/config:/config
    environment:
      # Disable GIL for true parallel thread execution
      - PYTHON_GIL=0
    labels:
      deunhealth.restart.on.unhealthy: "true"
    healthcheck:
        test: ["CMD", "uv", "run", "haminfo", "mqtt-healthcheck"]
        interval: 5m
        timeout: 15s
    profiles:
      - freethreaded  # Only start when explicitly requested

  # High-performance Rust MQTT ingest service
  # Build with: docker build -t hemna6969/haminfo:mqtt-ingest-rust ./rust-mqtt-ingest
  # This is designed to handle higher packet throughput than the Python version
  mqtt_ingest_rust:
    image: hemna6969/haminfo:mqtt-ingest-rust
    restart: on-failure
    depends_on:
        - "db_upgrade"
    volumes:
      - ./data/config/mqtt-ingest.toml:/app/config.toml:ro
    environment:
      # Can also configure via environment variables:
      # - MQTT_INGEST_MQTT__HOST=mqtt
      # - MQTT_INGEST_DATABASE__URL=postgres://...
      - RUST_LOG=mqtt_ingest=info
    profiles:
      - rust  # Only start when explicitly requested with --profile rust

  haminfo_memcached:
    image: ubuntu/memcached:latest
    restart: unless-stopped
    container_name: haminfo_memcached
    ports:
      - 11211:11211
    environment:
      TZ: ${TZ:-America/New_York}
      MEMCACHED_CACHE_SIZE: ${MEMCACHED_CACHE_SIZE:-64MB}
      MEMCACHED_MAX_CONNECTIONS: ${MEMCACHED_MAX_CONNECTIONS:-1024}
      MEMCACHED_THREADS: ${MEMCACHED_THREADS:-4}
      MEMCACHED_USER: ${MEMCACHED_USER:-memcached}
      MEMCACHED_PASSWORD: ${MEMCACHED_PASSWORD:?MEMCACHED_PASSWORD must be set}

  haminfo_api:
    image: hemna6969/haminfo:latest
    restart: unless-stopped
    container_name: haminfo_api
    depends_on:
        - "db_upgrade"
        - "haminfo_db"
        - "haminfo_memcached"
    ports:
      - 8081:8081
    volumes:
      - ./data/config:/config
    environment:
      - INIT_DB=False
      - COLUMNS=160


  haminfo_cron:
    image: hemna6969/haminfo:latest
    restart: unless-stopped
    container_name: haminfo_cron
    depends_on:
        - "haminfo_api"
    volumes:
      - ./data/config:/config
    entrypoint: /app/cron_entry.sh

  haminfo_adminer:
    image: adminer
    restart: unless-stopped
    container_name: haminfo_adminer
    depends_on:
        - "haminfo_db"
    ports:
      - 8066:8080

  haminfo_dashboard:
    image: hemna6969/haminfo-dashboard:latest
    build:
      context: .
      dockerfile: Dockerfile-dashboard
      args:
        BRANCH: ${BRANCH:-master}
        COMMIT_SHA: ${COMMIT_SHA:-}
    restart: unless-stopped
    container_name: haminfo_dashboard
    depends_on:
        - "db_upgrade"
        - "haminfo_db"
    ports:
      - 5001:5001
    volumes:
      - ./data/config:/config
    environment:
      - COLUMNS=160

networks:
  default:
    name: aprsd
    external: true
