<!-- haminfo/templates/dashboard/weather.html -->
{% extends "dashboard/base.html" %}

{% block title %}APRS Dashboard - Weather{% endblock %}

{% block header_right %}
<div class="live-indicator">LIVE</div>
{% endblock %}

{% block content %}
<!-- Filter Bar -->
<div class="card" style="padding:12px 16px;margin-bottom:16px;">
    <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
        <a href="{{ url_for('dashboard.weather_states') }}" style="padding:6px 12px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--accent-cyan);border-radius:4px;text-decoration:none;font-size:13px;">
            📍 View by State
        </a>
        <div style="display:flex;align-items:center;gap:8px;">
            <label style="color:var(--text-muted);font-size:12px;">Country:</label>
            <select id="wx-country-filter" style="width:180px;padding:6px 10px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:4px;">
                <option value="">All Countries</option>
            </select>
        </div>
        <div id="state-filter-container" style="display:none;align-items:center;gap:8px;">
            <label style="color:var(--text-muted);font-size:12px;">State:</label>
            <select id="wx-state-filter" style="width:180px;padding:6px 10px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:4px;">
                <option value="">All States</option>
            </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                <input type="checkbox" id="wx-recent-filter" style="width:16px;height:16px;accent-color:var(--accent-green);">
                <span style="color:var(--text-muted);font-size:12px;">Has recent data (24h)</span>
            </label>
        </div>
        <!-- Unit Toggle -->
        <div style="display:flex;align-items:center;gap:8px;">
            <span style="color:var(--text-muted);font-size:12px;">Units:</span>
            <div id="unit-toggle" style="display:flex;border:1px solid var(--border-color);border-radius:4px;overflow:hidden;">
                <button id="btn-metric" style="padding:4px 10px;font-size:11px;border:none;background:var(--accent-green);color:#000;cursor:pointer;">Metric</button>
                <button id="btn-imperial" style="padding:4px 10px;font-size:11px;border:none;background:var(--bg-tertiary);color:var(--text-muted);cursor:pointer;">Imperial</button>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
            <input type="text" id="wx-search" placeholder="Search callsign..." style="width:160px;padding:6px 10px;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:4px;">
        </div>
        <!-- Loading indicator -->
        <div id="wx-loading" style="display:none;align-items:center;gap:6px;">
            <div class="loading-spinner"></div>
            <span style="color:var(--accent-cyan);font-size:12px;">Loading...</span>
        </div>
        <div style="color:var(--text-muted);font-size:12px;" id="wx-result-count"></div>
    </div>
</div>

<!-- Weather Stations Grid -->
<div id="weather-grid"
     hx-get="{{ url_for('dashboard.api_weather_stations') }}?limit=100"
     hx-trigger="load"
     hx-swap="innerHTML"
     hx-indicator="#wx-loading">
    <div style="color:var(--text-muted);text-align:center;padding:40px;">Loading weather stations...</div>
</div>

<style>
    .loading-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--border-color);
        border-top-color: var(--accent-cyan);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    /* HTMX loading state - fade the grid */
    #weather-grid.htmx-request {
        opacity: 0.5;
        pointer-events: none;
        transition: opacity 0.2s ease;
    }
    
    /* Show loading indicator during HTMX request */
    .htmx-request #wx-loading,
    .htmx-request.htmx-indicator,
    #wx-loading.htmx-request {
        display: flex !important;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    var countrySelect = document.getElementById('wx-country-filter');
    var stateSelect = document.getElementById('wx-state-filter');
    var stateContainer = document.getElementById('state-filter-container');
    var recentCheckbox = document.getElementById('wx-recent-filter');
    var searchInput = document.getElementById('wx-search');
    var weatherGrid = document.getElementById('weather-grid');
    var resultCount = document.getElementById('wx-result-count');
    var loadingIndicator = document.getElementById('wx-loading');
    var btnMetric = document.getElementById('btn-metric');
    var btnImperial = document.getElementById('btn-imperial');

    // Unit state - default to metric, or load from localStorage
    var isMetric = localStorage.getItem('wxUnits') !== 'imperial';

    // Countries that support state filtering
    var stateCountries = ['US', 'CA', 'AU'];

    // Unit conversion functions
    function celsiusToFahrenheit(c) {
        return (c * 9/5) + 32;
    }

    function kmhToMph(kmh) {
        return kmh * 0.621371;
    }

    function hpaToInHg(hpa) {
        return hpa * 0.02953;
    }

    // Apply units to all weather values in the grid
    function applyUnits() {
        // Update button states
        if (isMetric) {
            btnMetric.style.background = 'var(--accent-green)';
            btnMetric.style.color = '#000';
            btnImperial.style.background = 'var(--bg-tertiary)';
            btnImperial.style.color = 'var(--text-muted)';
        } else {
            btnImperial.style.background = 'var(--accent-green)';
            btnImperial.style.color = '#000';
            btnMetric.style.background = 'var(--bg-tertiary)';
            btnMetric.style.color = 'var(--text-muted)';
        }

        // Convert temperatures
        document.querySelectorAll('.wx-temp').forEach(function(el) {
            var tempC = parseFloat(el.dataset.tempC);
            if (!isNaN(tempC)) {
                if (isMetric) {
                    el.textContent = tempC.toFixed(1) + '°C';
                } else {
                    el.textContent = celsiusToFahrenheit(tempC).toFixed(1) + '°F';
                }
            }
        });

        // Convert wind speeds
        document.querySelectorAll('.wx-wind').forEach(function(el) {
            var windKmh = parseFloat(el.dataset.windKmh);
            if (!isNaN(windKmh)) {
                if (isMetric) {
                    el.textContent = windKmh.toFixed(1) + ' km/h';
                } else {
                    el.textContent = kmhToMph(windKmh).toFixed(1) + ' mph';
                }
            }
        });

        // Convert pressure
        document.querySelectorAll('.wx-pressure').forEach(function(el) {
            var pressureHpa = parseFloat(el.dataset.pressureHpa);
            if (!isNaN(pressureHpa) && pressureHpa > 0) {
                if (isMetric) {
                    el.textContent = pressureHpa.toFixed(1) + ' hPa';
                } else {
                    el.textContent = hpaToInHg(pressureHpa).toFixed(2) + ' inHg';
                }
            }
        });
    }

    // Unit toggle handlers
    btnMetric.addEventListener('click', function() {
        isMetric = true;
        localStorage.setItem('wxUnits', 'metric');
        applyUnits();
    });

    btnImperial.addEventListener('click', function() {
        isMetric = false;
        localStorage.setItem('wxUnits', 'imperial');
        applyUnits();
    });

    // Load countries for dropdown
    fetch('{{ url_for("dashboard.api_weather_countries") }}')
        .then(function(r) { return r.json(); })
        .then(function(countries) {
            countries.forEach(function(c) {
                var opt = document.createElement('option');
                opt.value = c.country_code;
                opt.textContent = c.country_name + ' (' + c.count + ')';
                countrySelect.appendChild(opt);
            });
        });

    // Load states when country changes
    function loadStates(countryCode) {
        // Clear existing options
        stateSelect.innerHTML = '<option value="">All States</option>';
        
        if (!countryCode || stateCountries.indexOf(countryCode) === -1) {
            stateContainer.style.display = 'none';
            return;
        }
        
        stateContainer.style.display = 'flex';
        
        fetch('/api/dashboard/weather/states/' + countryCode)
            .then(function(r) { return r.json(); })
            .then(function(states) {
                states.forEach(function(s) {
                    var opt = document.createElement('option');
                    opt.value = s.code;
                    opt.textContent = s.name;
                    stateSelect.appendChild(opt);
                });
            });
    }

    // Build URL with filters
    function buildUrl() {
        var params = new URLSearchParams();
        params.set('limit', '100');
        if (countrySelect.value) params.set('country', countrySelect.value);
        if (stateSelect.value) params.set('state', stateSelect.value);
        if (recentCheckbox.checked) params.set('has_recent_data', 'true');
        if (searchInput.value.trim()) params.set('search', searchInput.value.trim());
        return '{{ url_for("dashboard.api_weather_stations") }}?' + params.toString();
    }

    // Show loading state
    function showLoading() {
        loadingIndicator.style.display = 'flex';
        weatherGrid.style.opacity = '0.5';
        weatherGrid.style.pointerEvents = 'none';
        resultCount.textContent = '';
    }

    // Hide loading state
    function hideLoading() {
        loadingIndicator.style.display = 'none';
        weatherGrid.style.opacity = '1';
        weatherGrid.style.pointerEvents = 'auto';
    }

    // Reload grid with HTMX
    function reloadGrid() {
        showLoading();
        htmx.ajax('GET', buildUrl(), {target: '#weather-grid', swap: 'innerHTML'});
    }

    // Filter handlers
    countrySelect.addEventListener('change', function() {
        // Reset state filter when country changes
        stateSelect.value = '';
        loadStates(countrySelect.value);
        reloadGrid();
    });
    stateSelect.addEventListener('change', reloadGrid);
    recentCheckbox.addEventListener('change', reloadGrid);

    // Server-side search with debounce
    var searchTimeout = null;
    searchInput.addEventListener('input', function(e) {
        // Clear previous timeout
        if (searchTimeout) clearTimeout(searchTimeout);
        
        // Debounce: wait 300ms after user stops typing
        searchTimeout = setTimeout(function() {
            reloadGrid();
        }, 300);
    });

    // Update count after HTMX swap
    document.body.addEventListener('htmx:afterSwap', function(e) {
        if (e.detail.target.id === 'weather-grid') {
            hideLoading();
            var count = document.querySelectorAll('#weather-grid .card').length;
            resultCount.textContent = count + ' stations';
            // Apply unit conversion to newly loaded content
            applyUnits();
        }
    });

    // Handle HTMX request errors
    document.body.addEventListener('htmx:responseError', function(e) {
        if (e.detail.target.id === 'weather-grid') {
            hideLoading();
            resultCount.textContent = 'Error loading stations';
            resultCount.style.color = 'var(--accent-red, #f55)';
        }
    });

    // Also hide loading on initial page load completion
    document.body.addEventListener('htmx:afterOnLoad', function(e) {
        if (e.detail.target.id === 'weather-grid') {
            hideLoading();
            applyUnits();
        }
    });

    // Apply initial button state
    applyUnits();
</script>
{% endblock %}
