<!-- Station Not Found Partial -->
<div class="card">
    <div class="card-header">
        <span class="card-title">Station Not Found</span>
    </div>
    <div class="card-body" style="text-align:center;padding:40px;">
        <div style="font-size:48px;color:var(--text-muted);margin-bottom:16px;">?</div>
        <div style="font-size:18px;color:var(--text-secondary);margin-bottom:8px;">
            No data found for <strong style="color:var(--accent-yellow);">{{ callsign }}</strong>
        </div>
        <div style="font-size:14px;color:var(--text-muted);">
            This station may not have transmitted any packets recently, or the callsign may be incorrect.
        </div>
    </div>
</div>
