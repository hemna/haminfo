<!-- State weather alerts banner -->
{% if alerts %}
<div class="mb-4">
    {% for alert in alerts %}
    <div class="alert {% if alert.level == 'severe' %}alert-danger{% else %}alert-warning{% endif %}" 
         style="background: {% if alert.level == 'severe' %}rgba(220,53,69,0.2){% else %}rgba(255,193,7,0.2){% endif %}; 
                border: 1px solid {% if alert.level == 'severe' %}rgba(220,53,69,0.5){% else %}rgba(255,193,7,0.5){% endif %}; 
                border-radius: 8px; 
                padding: 16px; 
                margin-bottom: 12px;
                display: flex;
                align-items: flex-start;
                gap: 12px;">
        <div style="font-size: 20px;">
            {% if alert.level == 'severe' %}⚠️{% else %}⚠{% endif %}
        </div>
        <div>
            <strong style="color: {% if alert.level == 'severe' %}#dc3545{% else %}#ffc107{% endif %};">{{ alert.message }}</strong>
            {% if alert.affected_stations %}
            <br>
            <small class="text-muted">
                Affected: {{ alert.affected_stations | join(', ') }}
            </small>
            {% endif %}
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
